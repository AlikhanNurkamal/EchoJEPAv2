# EchoJEPAv2 pretraining config — AMD cluster, 12 GPUs (myqos)
#
# Launch:
#   sbatch training/sbatch_pretrain_12gpu.sh

app: vjepa

# ── Output ────────────────────────────────────────────────────────────────────
folder: /vast/users/mohammad.yaqub/project/checkpoints/pretrain_icardio_336px_16f

# ── Data ──────────────────────────────────────────────────────────────────────
#
# Split filtering (set via sbatch script):
#   ECHOJEPA_ALLOWED_DICOMS  → training/train_dicoms.txt  (3,145,631 TRAIN DICOMs)
#   ECHOJEPA_HOLDOUT_DICOMS  → training/holdout_dicoms.txt (172,900 held-out)
data:
  dataset_type: WebDatasetVideoDataset
  datasets:
    - /vast/users/mohammad.yaqub/project/preprocessed_by_alikhan_for_echojepa
  datasets_weights:
    - 1.0
  batch_size: 32           # per-GPU; 12 GPUs → global batch = 384
  crop_size: 336
  dataset_fpcs:
    - 16
  fps: 24
  num_workers: 8
  patch_size: 16
  persistent_workers: true
  pin_mem: true
  tubelet_size: 2

# ── Data augmentation ─────────────────────────────────────────────────────────
data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 0.9
    - 1.1
  random_resize_scale:
    - 0.5
    - 1.0
  reprob: 0.0

# ── Loss ──────────────────────────────────────────────────────────────────────
loss:
  loss_exp: 1.0

# ── Masking ───────────────────────────────────────────────────────────────────
mask:
  - aspect_ratio: [0.75, 1.5]
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 8
    spatial_scale: [0.15, 0.15]
    temporal_scale: [1.0, 1.0]
  - aspect_ratio: [0.75, 1.5]
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 2
    spatial_scale: [0.70, 0.70]
    temporal_scale: [1.0, 1.0]

# ── Weights & Biases ──────────────────────────────────────────────────────────
wandb:
  enable: true
  project: echojepa-pretrain
  name: icardio-vitl16-336px-16f-amd12gpu

# ── Meta ──────────────────────────────────────────────────────────────────────
meta:
  dtype: bfloat16
  load_checkpoint: false
  read_checkpoint: null
  save_every_freq: -1
  seed: 42
  use_sdpa: false          # ROCm: disable SDPA to avoid mem_efficient_sdp issues
  checkpoints_to_keep: 3

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  model_name: vit_large
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  num_mask_tokens: 10
  use_rope: true
  use_silu: false
  zero_init_mask_tokens: true
  compile_model: false

# ── Optimization ──────────────────────────────────────────────────────────────
optimization:
  is_anneal: false
  force_load_pretrain: false
  anneal_ckpt: null

  ema: [0.99925, 0.99925]
  weight_decay: 0.04
  final_weight_decay: 0.04

  ipe: 1000
  ipe_scale: 1.25          # match EchoJEPA ViT-L recipe

  # LR scaled from V-JEPA2 recipe: 5.25e-4 × (global_batch / 3072)
  # 12 GPUs × 32 = 384 global batch → 5.25e-4 × (384/3072) = 6.56e-5
  start_lr: 1.3e-5
  lr: 6.56e-5
  final_lr: 1.0e-6         # cosine decay to near-zero (EchoJEPA-L cooldown target)

  warmup: 40       # epochs of linear LR warmup
  epochs: 200      # same as original EchoJEPA
