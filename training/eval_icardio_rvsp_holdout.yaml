app: vjepa
folder: /home/ahmedaly/iCardio/checkpoints/evals/icardio_rvsp_336px_e200
mem_per_gpu: 48G
nodes: 1
tasks_per_node: 1
num_workers: 6

eval_name: video_classification_frozen
resume_checkpoint: true
val_only: true
tag: icardio-rvsp-336px-e200

experiment:
  classifier:
    task_type: regression
    num_heads: 16
    num_probe_blocks: 4
    num_targets: 1

  data:
    dataset_type: WebDatasetLabeledVideoDataset
    # Point at dense shards once extraction completes (~9-10 PM)
    dataset_train:
      - /data/ahmedaly/rvsp_dense_shards
    dataset_val:
      - /data/ahmedaly/rvsp_dense_shards
    label_csv_train: /home/ahmedaly/iCardio/EchoJEPAv2/training/data_csvs/icardio_rvsp_holdout.csv
    label_csv_val: /home/ahmedaly/iCardio/EchoJEPAv2/training/data_csvs/icardio_rvsp_holdout.csv

    steps_per_epoch: 200
    val_steps_per_epoch: 200
    resolution: 336
    frames_per_clip: 16
    frame_step: 2
    num_segments: 2
    num_views_per_segment: 1

    # iCardio RVSP train stats — must match probe training
    target_mean: 47.7381
    target_std: 11.0777

  optimization:
    batch_size: 8
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.00005
      start_lr: 0.00005
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.00005
      start_lr: 0.00005
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.00005
      start_lr: 0.00005
      warmup: 0.0
      weight_decay: 0.4

    num_epochs: 1
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  checkpoint: /home/ahmedaly/iCardio/checkpoints/pretrain/icardio_vitl16_336px_16f/target_encoder_e200.pt
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: state_dict
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
